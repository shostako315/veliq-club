<!DOCTYPE html>
<html lang="ja">
<head>
  <title>Veliq Club | 音を設計するクラシック体験</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark only" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&family=Noto+Serif+JP:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
  :root{
    --bg:#0B0B0B; --ink:#F6F4EE; --gold:#C9A24A;
    --gold-20:rgba(201,162,74,.2); --g70:#6E6E6E; --g40:#A8A8A8;
    --max:1160px; --rad:14px; --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink)}
  body{font-family:"Noto Sans JP","Noto Serif JP","Playfair Display",system-ui,-apple-system,"Segoe UI",sans-serif; letter-spacing:.02em; line-height:1.8}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  .container{max-width:var(--max);margin:0 auto;padding:0 24px}
  .container.narrow{max-width:860px}.container.tight{max-width:760px}
  header{position:sticky;top:0;z-index:5;background:rgba(11,11,11,.82);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--gold-20)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:68px}
  .brand{display:flex;align-items:baseline;gap:.5rem;font-family:"Playfair Display",serif;font-weight:600;letter-spacing:.06em}
  .brand-mark{display:inline-block;width:36px;height:36px;line-height:36px;border:1px solid var(--gold);border-radius:50%;text-align:center;color:var(--gold);font-weight:700;margin-right:.25rem}
  .brand-text{font-size:20px}
  nav a{margin-left:18px;opacity:.9}
  .btn{display:inline-block;padding:12px 18px;border-radius:999px;border:1px solid transparent;transition:.25s;font-weight:600}
  .btn-outline{border-color:var(--gold)}.btn-outline:hover{background:var(--gold);color:#0B0B0B}
  .btn-gold{background:var(--gold);color:#0B0B0B}.btn-gold:hover{filter:saturate(110%)}
  .btn-ghost{border:1px solid var(--gold-20)}.btn-ghost:hover{border-color:var(--gold)}
  .display{font-family:"Playfair Display",serif;font-weight:600;letter-spacing:.04em;line-height:1.25;font-size:clamp(32px,4.2vw,56px)}
  .serif{font-family:"Playfair Display","Noto Serif JP",serif}
  .lead{font-size:clamp(16px,1.4vw,20px);color:var(--g40)} .muted{color:var(--g40)}
  .hero{position:relative;padding:18vh 0 14vh;border-bottom:1px solid var(--gold-20)}
  .hero .cta{margin-top:16px;display:flex;gap:12px;flex-wrap:wrap}
  .section{padding:96px 0}
  .page-hero{padding:120px 0 70px;border-bottom:1px solid var(--gold-20)}
  .cards{display:grid;gap:22px}.cards.cols-3{grid-template-columns:repeat(3,1fr)}
  .card{padding:24px;border:1px solid var(--gold-20);border-radius:var(--rad);background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,0));transition:.25s}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--gold)}
  .price{border:1px solid var(--gold-20);border-radius:var(--rad);overflow:hidden}
  .price .row{display:flex;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--gold-20)}
  .price .row:first-child{border-top:none}
  form{display:grid;gap:14px} label{display:grid;gap:8px;font-size:.95rem}
  input,textarea,select{background:#121212;border:1px solid var(--gold-20);border-radius:12px;padding:12px 14px;color:var(--ink);outline:none;transition:.2s}
  input:focus,textarea:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,74,.18)}
  footer{border-top:1px solid var(--gold-20);padding:40px 0}
  @media (max-width:960px){.cards.cols-3{grid-template-columns:1fr} nav{display:none}}
  </style>
</head>
<body>

<header>
  <div class="container nav">
    <a class="brand" href="index.html">
      <span class="brand-mark">V</span><span class="brand-text">Veliq&nbsp;Club</span>
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="cases.html">Cases</a>
      <a href="about.html">About</a>
      <a class="btn btn-outline" href="contact.html">相談する</a>
    </nav>
  </div>
</header>

<section class="page-hero">
  <div class="container narrow">
    <h1 class="display">Contact</h1>
    <p class="lead">初回面談は無料です。VariOrchestraとともに、最適な“音の設計”をご提案します。</p>
  </div>
</section>

<section class="section">
  <div class="container narrow">
    <p class="muted" style="margin-top:-8px;margin-bottom:22px;">
      ※ 演奏とコンサルティングは <strong>常にセット</strong> でのご提供となります。
    </p>

    <!-- 送信先はダミー。後で Formspree 等の URL に差し替え -->
    <form id="contact-form" action="ACTION_URL" method="POST" autocomplete="on">
      <label>お名前<span aria-hidden="true"> *</span>
        <input type="text" name="name" required>
      </label>

      <label>会社名 / ご所属
        <input type="text" name="company">
      </label>

      <label>メールアドレス<span aria-hidden="true"> *</span>
        <input type="email" name="email" required>
      </label>

      <label>ご相談種別
        <select name="category">
          <option value="event">企業／式典などのイベント相談</option>
          <option value="brand">ブランド・製品発表</option>
          <option value="salon">個人サロン／プライベート演奏</option>
          <option value="compose">作曲・編曲のご相談</option>
          <option value="other">その他</option>
        </select>
      </label>

      <label>ご相談内容（用途・規模・期日・会場など未確定でも大丈夫です）
        <textarea name="message" rows="6" placeholder="例）来賓100名の式典。式典冒頭15分＋歓談中30分程度。会場は都内ホテル。"></textarea>
      </label>

      <label>面談方法
        <select name="meeting">
          <option value="online">オンライン（Zoom）</option>
          <option value="inperson">対面（都内近郊）</option>
        </select>
      </label>

      <label>ご希望日時
        <input type="text" name="datetime" placeholder="例：来週火曜 午後 など">
      </label>

      <!-- 簡易スパム対策（表示しないフィールド） -->
      <input type="text" name="_gotcha" style="display:none">

      <button type="submit" class="btn btn-gold">無料相談を申し込む</button>
    </form>

    <p class="muted small" style="margin-top:10px;">
      送信後、通常1–2営業日以内にご連絡いたします。
    </p>
  </div>
</section>

<footer>
  <div class="container narrow">
    <p>© 2025 Veliq Club | VariOrchestra 常設連携</p>
  </div>
</footer>

<script>
  // GitHub Pagesでの簡易バリデーション＆ダミー送信
  document.getElementById('contact-form').addEventListener('submit', function(e){
    const url = this.getAttribute('action');
    if (url === 'ACTION_URL') {
      e.preventDefault();
      alert('送信先URL（ACTION_URL）が未設定です。Formspree等のエンドポイントに差し替えてください。');
    }
  });
</script>

</body>
</html>
